name: Smoke — testcontainers cache

on:
  push:
    branches: [runner-common-smoke]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: ./tc-test

jobs:
  cold:
    name: Cold run (first ever — testcontainers pulls redis + ryuk)
    runs-on: ubuntu-latest
    steps:
      - name: Runner common setup
        uses: mridang/action-runner-common@v1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Show images before test
        run: docker image ls

      - name: Run testcontainers test (timed)
        run: |
          START=$(date +%s)
          npm test
          END=$(date +%s)
          echo "::notice title=Cold testcontainers duration::$((END-START))s"

      - name: Show images after test (expect redis + ryuk pulled)
        run: docker image ls

  warm:
    name: Warm run (cache hit — redis + ryuk should be restored from cache)
    runs-on: ubuntu-latest
    needs: cold
    steps:
      - name: Runner common setup
        uses: mridang/action-runner-common@v1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Show images before test (expect redis + ryuk from cache)
        run: docker image ls

      - name: Run testcontainers test (timed; pulls should be skipped)
        run: |
          START=$(date +%s)
          npm test
          END=$(date +%s)
          echo "::notice title=Warm testcontainers duration::$((END-START))s"
